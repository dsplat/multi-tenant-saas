name: Split Monorepo
on:
  push:
    branches: [main]
    tags: ['v*']

env:
  GH_TOKEN: ${{ secrets.SPLIT_TOKEN }}

jobs:
  # 核心包 Packagist 更新
  update-core-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist update for core package
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USER }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/dsplat/multi-tenant-saas"}}')
          echo "Core Packagist: $RESPONSE"

  # 模块分包 - 使用 git subtree split 优化
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: 'src/Modules/Ai'
            repo: multi-tenant-saas-module-ai
          - prefix: 'src/Modules/ApiToken'
            repo: multi-tenant-saas-module-api-token
          - prefix: 'src/Modules/Auth'
            repo: multi-tenant-saas-module-auth
          - prefix: 'src/Modules/Billing'
            repo: multi-tenant-saas-module-billing
          - prefix: 'src/Modules/Contracts'
            repo: multi-tenant-saas-module-contracts
          - prefix: 'src/Modules/Conversation'
            repo: multi-tenant-saas-module-conversation
          - prefix: 'src/Modules/Coupon'
            repo: multi-tenant-saas-module-coupon
          - prefix: 'src/Modules/DeveloperPortal'
            repo: multi-tenant-saas-module-developer-portal
          - prefix: 'src/Modules/Domain'
            repo: multi-tenant-saas-module-domain
          - prefix: 'src/Modules/Event'
            repo: multi-tenant-saas-module-event
          - prefix: 'src/Modules/Form'
            repo: multi-tenant-saas-module-form
          - prefix: 'src/Modules/Infrastructure'
            repo: multi-tenant-saas-module-infrastructure
          - prefix: 'src/Modules/Logging'
            repo: multi-tenant-saas-module-logging
          - prefix: 'src/Modules/Lottery'
            repo: multi-tenant-saas-module-lottery
          - prefix: 'src/Modules/Monitoring'
            repo: multi-tenant-saas-module-monitoring
          - prefix: 'src/Modules/Notification'
            repo: multi-tenant-saas-module-notification
          - prefix: 'src/Modules/Operator'
            repo: multi-tenant-saas-module-operator
          - prefix: 'src/Modules/Payment'
            repo: multi-tenant-saas-module-payment
          - prefix: 'src/Modules/Platform'
            repo: multi-tenant-saas-module-platform
          - prefix: 'src/Modules/Plugin'
            repo: multi-tenant-saas-module-plugin
          - prefix: 'src/Modules/Sms'
            repo: multi-tenant-saas-module-sms
          - prefix: 'src/Modules/SSL'
            repo: multi-tenant-saas-module-ssl
          - prefix: 'src/Modules/Storage'
            repo: multi-tenant-saas-module-storage
          - prefix: 'src/Modules/User'
            repo: multi-tenant-saas-module-user
          - prefix: 'src/Modules/Voting'
            repo: multi-tenant-saas-module-voting
          - prefix: 'src/Modules/Workflow'
            repo: multi-tenant-saas-module-workflow
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于 subtree split

      - name: Push to ${{ matrix.repo }} via git subtree
        run: |
          set -euo pipefail

          ORG="dsplat"
          REPO="${{ matrix.repo }}"
          PREFIX="${{ matrix.prefix }}"
          BRANCH_NAME="split-${REPO}"

          echo "📦 Splitting $PREFIX -> $ORG/$REPO"

          # 使用 git subtree split 创建只包含模块文件的分支
          git subtree split --prefix="$PREFIX" --branch="$BRANCH_NAME"

          # 添加目标仓库作为 remote
          git remote add target "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${REPO}.git" 2>/dev/null || \
            git remote set-url target "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${REPO}.git"

          # 检查目标仓库是否存在
          if git ls-remote --exit-code target main 2>/dev/null; then
            echo "Target repo exists, force pushing..."
            git push target "$BRANCH_NAME:main" --force
          else
            echo "Initializing empty repo..."
            # 创建空仓库并推送
            git push target "$BRANCH_NAME:main" --force
          fi

          # 推送 tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            echo "Pushing tag $TAG..."
            git push target "refs/tags/$TAG" --force 2>/dev/null || \
              git push target "$BRANCH_NAME:refs/tags/$TAG" --force
          fi

          echo "✅ Pushed to $ORG/$REPO"

      - name: Trigger Packagist update
        run: |
          REPO_URL="https://github.com/dsplat/${{ matrix.repo }}"
          RESPONSE=$(curl -s -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USER }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"$REPO_URL\"}}")
          echo "Packagist: $RESPONSE"
